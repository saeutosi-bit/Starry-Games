<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 Starry Horizons</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            color: #d6e0f5;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #05080f;
            position: relative;
        }

        /* ===== КОСМИЧЕСКИЙ ФОН ===== */
        .space-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .space-bg .deep-space {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 20% 20%, #0a1a4a 0%, #05080f 50%),
                radial-gradient(ellipse at 80% 80%, #1a0a3a 0%, #05080f 50%),
                radial-gradient(ellipse at 50% 50%, #0a0a2a 0%, #05080f 70%);
            animation: deepPulse 20s ease-in-out infinite alternate;
        }

        @keyframes deepPulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        .stars-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        .stars-layer.s1 { animation: starDrift1 60s linear infinite; }
        .stars-layer.s2 { animation: starDrift2 80s linear infinite; }
        .stars-layer.s3 { animation: starDrift3 100s linear infinite; }

        @keyframes starDrift1 {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50px, -30px); }
        }
        @keyframes starDrift2 {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, -50px); }
        }
        @keyframes starDrift3 {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-20px, 40px); }
        }

        .star {
            position: absolute;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite alternate;
            will-change: transform, opacity;
        }
        .star.bright { box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }
        .star.colored { box-shadow: 0 0 30px var(--color); }

        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.6); }
            100% { opacity: 0.9; transform: scale(1.1); }
        }

        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
        }
        .nebula.n1 {
            width: 700px; height: 500px;
            top: 5%; left: -10%;
            background: radial-gradient(ellipse, #6a2a9a, #4a1a6a, transparent 70%);
            animation: floatNebula 30s ease-in-out infinite alternate;
            opacity: 0.2;
        }
        .nebula.n2 {
            width: 600px; height: 600px;
            bottom: 0%; right: -5%;
            background: radial-gradient(ellipse, #1a5a9a, #0a2a5a, transparent 70%);
            animation: floatNebula 35s ease-in-out infinite alternate-reverse;
            opacity: 0.18;
        }
        .nebula.n3 {
            width: 500px; height: 400px;
            top: 40%; left: 30%;
            background: radial-gradient(ellipse, #9a2a5a, #5a1a3a, transparent 70%);
            animation: floatNebula 25s ease-in-out infinite alternate;
            opacity: 0.12;
        }

        @keyframes floatNebula {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { transform: translate(80px, -60px) scale(1.3) rotate(5deg); }
        }

        .planet {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: inset -30px -30px 80px rgba(0, 0, 0, 0.6);
        }
        .planet.p1 {
            width: 150px; height: 150px;
            top: 12%; right: 6%;
            background: radial-gradient(ellipse at 35% 30%, #b8944a, #6a3a1a, #2a1a0a);
            box-shadow: 0 0 80px rgba(184, 148, 74, 0.15), inset -40px -40px 100px rgba(0,0,0,0.6);
            animation: floatPlanet 25s ease-in-out infinite alternate;
        }
        .planet.p2 {
            width: 80px; height: 80px;
            bottom: 15%; left: 3%;
            background: radial-gradient(ellipse at 30% 30%, #5a8aaa, #2a4a6a, #0a1a3a);
            box-shadow: 0 0 50px rgba(90, 138, 170, 0.12), inset -20px -20px 50px rgba(0,0,0,0.6);
            animation: floatPlanet 18s ease-in-out infinite alternate-reverse;
        }
        .planet.p3 {
            width: 50px; height: 50px;
            top: 45%; left: 20%;
            background: radial-gradient(ellipse at 30% 30%, #8a5a4a, #4a2a1a);
            box-shadow: 0 0 30px rgba(138, 90, 74, 0.08), inset -15px -15px 30px rgba(0,0,0,0.5);
            animation: floatPlanet 22s ease-in-out infinite alternate;
            opacity: 0.6;
        }

        @keyframes floatPlanet {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-30px, 30px) rotate(8deg); }
        }

        .galaxy {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.04;
            animation: galaxySpin 120s linear infinite;
        }
        .galaxy.g1 {
            width: 500px; height: 500px;
            top: 20%; left: 25%;
            background: radial-gradient(ellipse, rgba(100, 50, 200, 0.3), transparent 60%);
        }

        @keyframes galaxySpin {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(360deg) scale(1.1); }
        }

        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: shoot linear infinite;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            will-change: transform, opacity;
        }
        .shooting-star::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 80px;
            height: 1.5px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.5), transparent);
        }

        @keyframes shoot {
            0% { transform: translate(0, 0) rotate(-45deg); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: translate(-400px, 400px) rotate(-45deg); opacity: 0; }
        }

        /* ===== КОНТЕЙНЕР ===== */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 800px;
            width: 100%;
            padding: 24px 20px;
        }

        /* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 48px;
            background: rgba(8, 12, 26, 0.5);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 80px;
            border: 1px solid rgba(75, 100, 160, 0.15);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f7e272;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            font-size: 1.8rem;
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(4deg); }
        }

        .top-bar .badge-community {
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            background: rgba(30, 50, 100, 0.3);
            border: 1px solid rgba(60, 85, 140, 0.2);
            color: #aac0f0;
            transition: 0.3s;
        }
        .top-bar .badge-community:hover {
            background: rgba(50, 80, 160, 0.35);
            border-color: #6a8ac0;
            transform: scale(1.05);
        }

        /* ===== НАЗВАНИЕ ===== */
        .title {
            font-size: 4.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f7e272, #f0b8a0, #f7e272);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientMove 4s ease-in-out infinite;
            text-shadow: 0 0 60px rgba(247, 226, 114, 0.1);
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: 1.2rem;
            color: #9bb0e0;
            letter-spacing: 4px;
            font-weight: 300;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* ===== ТАЙМЕР ===== */
        .timer-wrapper {
            background: rgba(8, 12, 26, 0.5);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 24px 32px;
            border: 1px solid rgba(60, 85, 140, 0.12);
            margin-bottom: 40px;
            display: inline-block;
        }

        .timer-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #6a80b5;
            margin-bottom: 8px;
        }

        .timer {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .timer-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .timer-item .number {
            font-size: 3.2rem;
            font-weight: 700;
            color: #f7e272;
            font-variant-numeric: tabular-nums;
            min-width: 60px;
            line-height: 1;
        }

        .timer-item .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #6a80b5;
            margin-top: 4px;
        }

        .timer-separator {
            font-size: 3rem;
            color: #4f659a;
            align-self: flex-start;
            padding-top: 4px;
        }

        /* ===== КНОПКИ ===== */
        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 48px;
        }

        .btn {
            padding: 14px 44px;
            border-radius: 60px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-primary {
            background: rgba(60, 180, 80, 0.15);
            border: 1px solid rgba(60, 180, 80, 0.25);
            color: #a8d08d;
        }
        .btn-primary:hover {
            background: rgba(60, 180, 80, 0.25);
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(60, 180, 80, 0.08);
        }

        .btn-secondary {
            background: rgba(60, 130, 255, 0.12);
            border: 1px solid rgba(60, 130, 255, 0.2);
            color: #7aafff;
        }
        .btn-secondary:hover {
            background: rgba(60, 130, 255, 0.2);
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(60, 130, 255, 0.08);
        }

        /* ===== ССЫЛКИ ===== */
        .links {
            display: flex;
            gap: 28px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 16px 24px;
            background: rgba(8, 12, 26, 0.3);
            border-radius: 60px;
            border: 1px solid rgba(60, 85, 140, 0.08);
            backdrop-filter: blur(12px);
        }

        .links a {
            color: #8eb0ff;
            text-decoration: none;
            font-weight: 400;
            transition: 0.3s;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            border: 1px solid transparent;
        }

        .links a:hover {
            color: #f7e272;
            border-color: rgba(247, 201, 72, 0.2);
            background: rgba(247, 201, 72, 0.05);
            transform: translateY(-2px);
        }

        /* ===== НИЗ ===== */
        .footer {
            margin-top: 28px;
            font-size: 0.7rem;
            color: #3a4a6a;
            letter-spacing: 1px;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 700px) {
            .title { font-size: 2.8rem; }
            .subtitle { font-size: 0.9rem; letter-spacing: 2px; }
            .timer-item .number { font-size: 2.2rem; min-width: 40px; }
            .timer { gap: 12px; }
            .timer-separator { font-size: 2rem; }
            .timer-wrapper { padding: 16px 20px; }
            .buttons { gap: 12px; }
            .btn { padding: 12px 28px; font-size: 0.85rem; }
            .top-bar { padding: 10px 16px; }
            .logo { font-size: 1.1rem; }
            .links { gap: 14px; padding: 12px 16px; }
            .links a { font-size: 0.85rem; }
            .planet.p1 { width: 80px; height: 80px; top: 8%; right: 2%; }
            .planet.p2 { width: 50px; height: 50px; bottom: 10%; left: 1%; }
            .planet.p3 { display: none; }
        }

        @media (max-width: 420px) {
            .title { font-size: 2rem; }
            .timer-item .number { font-size: 1.6rem; min-width: 30px; }
            .timer { gap: 6px; }
            .timer-separator { font-size: 1.4rem; }
            .btn { padding: 10px 20px; font-size: 0.75rem; }
            .top-bar { flex-direction: column; align-items: center; gap: 8px; border-radius: 40px; }
        }
    </style>
</head>
<body>

    <!-- ===== КОСМИЧЕСКИЙ ФОН ===== -->
    <div class="space-bg">
        <div class="deep-space"></div>
        <div class="stars-layer s1" id="starsLayer1"></div>
        <div class="stars-layer s2" id="starsLayer2"></div>
        <div class="stars-layer s3" id="starsLayer3"></div>
        <div class="nebula n1"></div>
        <div class="nebula n2"></div>
        <div class="nebula n3"></div>
        <div class="galaxy g1"></div>
        <div class="planet p1"></div>
        <div class="planet p2"></div>
        <div class="planet p3"></div>
        <div id="shootingStarsContainer"></div>
    </div>

    <!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
    <div class="container">

        <!-- Верхняя панель: лого + кнопка Community -->
        <div class="top-bar">
            <div class="logo">
                <span class="logo-icon">🌌</span>
                Starry Horizons
            </div>
            <a href="https://www.roblox.com/communities/599180268/Starry-Horizons-Community#!/about" target="_blank" class="badge-community">🌐 Community</a>
        </div>

        <!-- Название -->
        <div class="title">Starry Horizons</div>
        <div class="subtitle">⚡ Release Coming Soon ⚡</div>

        <!-- Таймер -->
        <div class="timer-wrapper">
            <div class="timer-label">📅 Release — July 24, 2026 — 18:00</div>
            <div class="timer" id="timer">
                <div class="timer-item">
                    <span class="number" id="days">00</span>
                    <span class="label">Days</span>
                </div>
                <span class="timer-separator">:</span>
                <div class="timer-item">
                    <span class="number" id="hours">00</span>
                    <span class="label">Hours</span>
                </div>
                <span class="timer-separator">:</span>
                <div class="timer-item">
                    <span class="number" id="minutes">00</span>
                    <span class="label">Minutes</span>
                </div>
                <span class="timer-separator">:</span>
                <div class="timer-item">
                    <span class="number" id="seconds">00</span>
                    <span class="label">Seconds</span>
                </div>
            </div>
        </div>

        <!-- Кнопки: Трейлер и Тизер -->
        <div class="buttons">
            <a href="https://www.youtube.com/watch?v=t4YNEta4eFg" target="_blank" class="btn btn-primary">▶ Trailer</a>
            <a href="https://www.youtube.com/watch?v=p7QhxwOUh8g" target="_blank" class="btn btn-secondary">🎬 Teaser Trailer</a>
        </div>

        <!-- Соцсети -->
        <div class="links">
            <a href="https://x.com/StarryGamesRblx" target="_blank">🐦 X</a>
            <a href="https://www.youtube.com/@Starry_Gamess" target="_blank">▶️ YouTube</a>
            <a href="https://discord.gg/MANnQHMST" target="_blank">💬 Discord</a>
        </div>

        <div class="footer">⭐ Starry Horizons &bull; 2026</div>
    </div>

    <script>
        // ================================================================
        //  ТАЙМЕР
        // ================================================================

        const targetDate = new Date('2026-07-24T18:00:00').getTime();

        function updateTimer() {
            const now = Date.now();
            let diff = targetDate - now;

            if (diff < 0) diff = 0;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');

            if (diff === 0) {
                document.querySelector('.timer-label').textContent = '🚀 LAUNCHED!';
            }
        }

        updateTimer();
        setInterval(updateTimer, 1000);

        // ================================================================
        //  КОСМИЧЕСКИЙ ФОН — ЗВЁЗДЫ
        // ================================================================

        function createStars(layerId, count, sizeRange, brightness) {
            const layer = document.getElementById(layerId);
            if (!layer) return;
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * sizeRange + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 4 + 2) + 's');
                star.style.animationDelay = (Math.random() * 6) + 's';
                if (brightness > 0.7) star.classList.add('bright');
                if (Math.random() > 0.85) {
                    star.classList.add('colored');
                    const colors = ['#ff6b6b', '#ffd93d', '#6bcbff', '#ff6b9d', '#a8d08d'];
                    star.style.setProperty('--color', colors[Math.floor(Math.random() * colors.length)]);
                }
                layer.appendChild(star);
            }
        }

        createStars('starsLayer1', 120, 2, 0.6);
        createStars('starsLayer2', 70, 3, 0.8);
        createStars('starsLayer3', 40, 4, 1);

        // ================================================================
        //  ПАДАЮЩИЕ ЗВЁЗДЫ
        // ================================================================

        function createShootingStar() {
            const container = document.getElementById('shootingStarsContainer');
            if (!container) return;
            const star = document.createElement('div');
            star.className = 'shooting-star';
            star.style.left = (Math.random() * 80 + 10) + '%';
            star.style.top = (Math.random() * 40 + 5) + '%';
            star.style.animationDuration = (Math.random() * 4 + 2) + 's';
            star.style.animationDelay = (Math.random() * 30) + 's';
            container.appendChild(star);
        }

        for (let i = 0; i < 5; i++) setTimeout(createShootingStar, i * 2000);
        setInterval(createShootingStar, 12000);

        console.log('🌌 Starry Horizons — Countdown Page Loaded');
    </script>

</body>
</html>
